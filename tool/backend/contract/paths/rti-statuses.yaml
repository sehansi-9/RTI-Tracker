/rti-status:
  # create a new status
  post:
    summary: Create an RTI status
    operationId: createRTIStatus
    description: Create a new RTI status.
    tags:
      - RTI Statuses
    security:
      - opaqueBearerToken: []
    requestBody:
      required: true
      description: JSON request body with status metadata.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/rti-statuses.yaml#/RTIStatusRequest"

    responses:
      "201":
        description: Status created successfully.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/rti-statuses.yaml#/RTIStatusResponse"
            example:
              id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              name: Delivery
              createdAt: "2026-03-31T09:00:00Z"
              updatedAt: "2026-03-31T09:00:00Z"
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses/Errors.yaml#/Conflict"
      "422":
        $ref: "../components/responses/Errors.yaml#/UnprocessableEntity"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

  # List all statuses
  get:
    summary: List all RTI statuses
    operationId: listRTIStatuses
    description: Returns a paginated list of all RTI statuses.
    tags:
      - RTI Statuses
    security:
      - opaqueBearerToken: []
    parameters:
      - $ref: "../components/parameters/Pagination.yaml#/PageParam"
      - $ref: "../components/parameters/Pagination.yaml#/PageSizeParam"
    responses:
      "200":
        description: A paginated list of statuses.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/rti-statuses.yaml#/RTIStatusListResponse"
            example:
              data:
                - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  name: Delivery
                  createdAt: "2026-03-31T09:00:00Z"
                  updatedAt: "2026-03-31T09:00:00Z"
              pagination:
                page: 1
                pageSize: 20
                totalItems: 84
                totalPages: 5
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

/rti-status/{rti_status_id}:
  # Get a single status by ID
  get:
    summary: Get an RTI status by ID
    operationId: getRTIStatusById
    description: Returns a single RTI status identified by its UUID.
    tags:
      - RTI Statuses
    security:
      - opaqueBearerToken: []
    parameters:
      - name: rti_status_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID of the RTI status
    responses:
      "200":
        description: Status found and returned successfully.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/rti-statuses.yaml#/RTIStatusResponse"
            example:
              id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              name: Delivery
              createdAt: "2026-03-31T09:00:00Z"
              updatedAt: "2026-03-31T09:00:00Z"
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses/Errors.yaml#/NotFound"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

  # Update a single status by ID
  put:
    summary: Update an RTI status
    operationId: updateRTIStatus
    description: Updates the name of an RTI status.
    tags:
      - RTI Statuses
    security:
      - opaqueBearerToken: []
    parameters:
      - name: rti_status_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID of the RTI status
    requestBody:
      required: true
      description: JSON request body with status metadata.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/rti-statuses.yaml#/RTIStatusRequest"
    responses:
      "200":
        description: Status updated successfully.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/rti-statuses.yaml#/RTIStatusResponse"
            example:
              id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              name: Delivery
              createdAt: "2026-03-31T09:00:00Z"
              updatedAt: "2026-03-31T09:00:00Z"
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses/Errors.yaml#/NotFound"
      "409":
        $ref: "../components/responses/Errors.yaml#/Conflict"
      "422":
        $ref: "../components/responses/Errors.yaml#/UnprocessableEntity"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"

  # Delete a single status by ID
  delete:
    summary: Delete an RTI status
    operationId: deleteRTIStatus
    description: Permanently deletes an RTI status by UUID. Returns 204 No Content on success. If the resource is linked with some other resources, cannot be deleted.
    tags:
      - RTI Statuses
    security:
      - opaqueBearerToken: []
    parameters:
      - name: rti_status_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID of the RTI status
    responses:
      "204":
        description: Status deleted successfully. No content returned.
      "401":
        $ref: "../components/responses/Errors.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses/Errors.yaml#/NotFound"
      "409":
        $ref: "../components/responses/Errors.yaml#/Conflict"
      "500":
        $ref: "../components/responses/Errors.yaml#/InternalServerError"
